version: '3.8'

services:
  db_evolution:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=evis
      - POSTGRES_PASSWORD=evis-secret
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data

  redis_evolution:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data

  evolution-api:
    image: atendai/evolution-api:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTH_TYPE=apikey
      - AUTH_API_KEY=evis-ai-secret-key
      - AUTHENTICATION_GLOBAL_AUTH_TOKEN=evis-ai-secret-key
      - GLOBAL_AUTH_TOKEN=evis-ai-secret-key
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evis:evis-secret@db_evolution:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      # Nova tentativa de conexão via URI (mais estável para v2)
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis_evolution:6379
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis_evolution:6379
    depends_on:
      - db_evolution
      - redis_evolution
    volumes:
      - evolution_data:/evolution/instances

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
  evolution_data:
  evolution_db_data:
  evolution_redis_data:
